<div class="grid grid-cols-5 min-h-screen">
  
  <div class="flex flex-col gap-4 justify-center items-center h-full w-full col-span-1">
    <a href="/perfil" class="group flex flex-col items-center gap-4">
      <div class="w-24 h-24 rounded-full bg-gray-300"></div>
      <h1 class="text-xl font-bold text-gray-800 group-hover:text-purple-700 transition-colors">
        {{ usuario.nombre }}
      </h1>
      <h2>ir a mi perfil</h2>
    </a>
  </div>

  <div class="col-span-3 flex flex-col items-center pt-10 px-4 overflow-y-auto shadow-[15px_0_20px_-15px_rgba(0,0,0,0.1),-15px_0_20px_-15px_rgba(0,0,0,0.1)]">

    <div class="w-full max-w-3xl mt-8 p-5 bg-white border border-gray-200 rounded-2xl shadow-sm mb-10">
      <input 
        type="text" 
        [(ngModel)]="nuevaPublicacion.titulo" 
        placeholder="Título..." 
        class="w-full border-b border-gray-300 p-2 mb-3 focus:outline-none" 
      />

      <textarea 
        [(ngModel)]="nuevaPublicacion.mensaje" 
        placeholder="¿Qué estás pensando?" 
        rows="1" 
        class="w-full p-2 rounded-xl focus:outline-1 focus:outline-purple-400 resize-none border border-gray-200"
      ></textarea>
      
      <div class="flex justify-end pt-1">
        <button 
          (click)="enviarPublicacion()" 
          class="bg-purple-700 text-white px-5 py-1.5 rounded-xl text-sm font-semibold hover:bg-purple-800 transition-all"
        >
          Publicar
        </button>
      </div>
    </div>

    <div class="w-full max-w-3xl flex flex-col gap-4">
      
      <div *ngFor="let p of listaPublicaciones" class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
        <h3 class="font-bold text-md text-gray-800">{{ p.titulo }}</h3>
        <p class="text-gray-600 text-sm mt-1">{{ p.mensaje }}</p>
        
        <img *ngIf="p.imagenUrl" [src]="p.imagenUrl" class="mt-3 rounded-lg w-full" />
      </div>

    </div>

  </div>
</div>
