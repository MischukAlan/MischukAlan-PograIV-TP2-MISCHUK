<div class="grid grid-cols-5 min-h-screen bg-linear-to-b from-[#540863] via-[#71306F] to-[#92487A]">
  <div *ngIf="cargando()" class="fixed inset-0 bg-black/20 flex items-center justify-center z-50">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600"></div>
  </div>

  <div class="col-span-1 border-r border-[#92487A] flex flex-col pt-10 px-4 justify-between pb-8 sticky top-0 h-screen">
    <div class=" flex flex-col items-center w-full gap-8">
      
      <a href="/perfil" class="group flex flex-col items-center gap-3 w-full text-center transition-all duration-300">
        <img *ngIf="usuario.foto"
          [src]="usuario.foto"
          class="w-24 h-24 rounded-full object-cover border-2 border-[#E49BA6] shadow-sm group-hover:scale-105 group-hover:drop-shadow-[0_0_8px_rgba(255,211,213,0.4)] transition-all duration-300"/>
          
        <div *ngIf="!usuario.foto" 
          class="w-24 h-24 rounded-full bg-purple-400 flex items-center justify-center text-white text-3xl font-bold group-hover:scale-105 transition-all duration-300">
          {{ usuario | iniciales }}
        </div>

        <div>
          <h1 class="text-xl font-bold text-[#FFD3D5] uppercase tracking-wider group-hover:text-white transition-colors">
            {{ usuario.nombre }}
          </h1>
          <h2 class="text-xs font-semibold text-[#E49BA6] group-hover:underline mt-0.5">
            Ir a mi perfil
          </h2>
        </div>
      </a>

      <div class="w-4/5 h-px bg-linear-to-r from-transparent via-[#E49BA6]/30 to-transparent"></div>

      <nav class="flex flex-col gap-2 w-full px-2">
        
        <a href="/dashboard-usuarios" 
           class="group flex items-center gap-3 px-4 py-3 rounded-xl text-[#FFD3D5] font-medium bg-[#71306F]/30 border border-[#E49BA6]/20 hover:bg-[#71306F] hover:border-[#E49BA6] hover:text-white transition-all duration-300 shadow-sm active:scale-98">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-[#E49BA6] group-hover:scale-110 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-2.533-2.336C17.512 15.73 16.2 15.422 15 15.422c-1.2 0-2.512.307-3.213.79a4.125 4.125 0 0 0-2.533 2.336 9.337 9.337 0 0 0 4.121.952Zm-6 0A9.27 9.27 0 0 1 7.5 19a9.34 9.34 0 0 1-4.122-.952 4.125 4.125 0 0 1 2.533-2.336C6.634 15.27 7.87 15 9 15c1.13 0 2.366.27 3.09.712a4.125 4.125 0 0 1-2.533 2.336 9.27 9.27 0 0 1-1.557.08ZM12 4.5a3.75 3.75 0 1 0 0 7.5 3.75 3.75 0 0 0 0-7.5ZM6 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm14.25 0a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
          <span class="text-sm tracking-wide">Panel Usuarios</span>
        </a>

        <a href="/dashboard-estadisticas" 
           class="group flex items-center gap-3 px-4 py-3 rounded-xl text-[#FFD3D5] font-medium bg-[#71306F]/30 border border-[#E49BA6]/20 hover:bg-[#71306F] hover:border-[#E49BA6] hover:text-white transition-all duration-300 shadow-sm active:scale-98">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-[#E49BA6] group-hover:scale-110 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
          </svg>
          <span class="text-sm tracking-wide">Estadísticas</span>
        </a>

      </nav>
    </div>
    
    <div></div>
  </div>

  <div class="col-span-3 border-r border-r-[#92487A] flex flex-col items-center pt-10 px-4 overflow-y-auto shadow-[15px_0_20px_-15px_rgba(0,0,0,0.1),-15px_0_20px_-15px_rgba(0,0,0,0.1)]">
    
   <div class="w-full max-w-3xl bg-[#92487A] rounded-3xl border border-[#E49BA6] shadow-md p-6 mb-8 mt-9">

    <div class="flex gap-4">

      <img *ngIf="usuario.foto"
        [src]="usuario.foto"
        class="w-14 h-14 rounded-full object-cover border-2 border-[#E49BA6] shadow-sm"/>
        
      <div *ngIf="!usuario.foto" 
          class="w-14 h-14 rounded-full bg-purple-400 flex items-center justify-center text-white text-xl font-bold">
        {{ usuario  | iniciales }}
      </div>

      <div class="flex-1">

        <input
          type="text"
          [(ngModel)]="nuevaPublicacion.titulo"
          placeholder="Título de la publicación"
          class="w-full text-xl text-[#FFD3D5] font-semibold placeholder:text-[#FFD3D5] border-b border-[#FFD3D5] pb-3 focus:outline-none focus:border-b-2 focus:border-b-[#FFD3D5] transition-all"
        />

        <textarea
          [(ngModel)]="nuevaPublicacion.mensaje"
          placeholder="¿Qué estás pensando?"
          rows="4"
          class="w-full mt-4 p-4 text-[#FFD3D5] border placeholder:text-[#FFD3D5] border-[#FFD3D5] rounded-2xl resize-none focus:outline-none focus:ring focus:ring-[#E49BA6] transition-all"
        ></textarea>

      <div class="flex justify-between items-center">
       <label class="cursor-pointer inline-flex items-center gap-2 text-[#E49BA6] hover:text-[#FFD3D5] transition">
        <svg class="w-6 h-6 " aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8v8a5 5 0 1 0 10 0V6.5a3.5 3.5 0 1 0-7 0V15a2 2 0 0 0 4 0V8"/>
        </svg>
        <input type="file" (change)="subirImagen($event)" accept="image/*" class="hidden"/>
        
          <span *ngIf="!cargada()">
            Subir imagen
          </span>

          <span *ngIf="cargada()" class="flex items-center gap-1 font-medium">
            ✓ Imagen cargada
          </span>
        </label>

          <button
            (click)="enviarPublicacion()"
            class="px-7 mt-1 py-2.5 cursor-pointer text-[#92487A] bg-[#E49BA6] hover:bg-[#FFD3D5] font-semibold rounded-full shadow-md hover:shadow-lg transition-all duration-300 hover:scale-105">
            Publicar
          </button>
        </div>
      </div>

    </div>
    </div>

    <div class="w-full max-w-3xl flex justify-end mb-3">
        <div class="relative flex items-center">
          <select
          (change)="cambiarOrden($event)" 
          class="rounded-b-lg border-b border-[#E49BA6] text-sm text-[#E49BA6] focus:outline-none cursor-pointer hover:border-[#FFD3D5] hover:text-[#FFD3D5] transition-all">
          <option class="bg-[#92487A] text-[#E49BA6]" value="fecha">Más recientes</option>
          <option class="bg-[#92487A] text-[#E49BA6]" value="likes">Más populares</option>
        </select>
      </div>
    </div>

    <div class="w-full max-w-3xl flex flex-col gap-4 mb-4">

      <app-publicacion
        *ngFor="let p of listaPublicaciones()"
        [publicacion]="p"
        (eliminada)="eliminarPublicacion($event)"
        (likeCambiado)="actualizarPublicacion($event)"
        (editada)="procesarEdicion($event)">
        
      </app-publicacion>

      <div 
        scrollInfinito 
        (cargarMas)="cargarMas()"
        class="flex justify-center mb-8 mt-10">

        @if(noHayMas()) {
          <div class="flex items-center gap-3 text-gray-400 text-sm">
            <span class="h-px w-16 bg-gray-300"></span>

            <span>
              No hay más publicaciones
            </span>

            <span class="h-px w-16 bg-gray-300"></span>
          </div>
        }
      </div>
    </div>
  </div>
