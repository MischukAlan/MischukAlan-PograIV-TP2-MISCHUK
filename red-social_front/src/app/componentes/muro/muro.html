<div class="grid grid-cols-5 min-h-screen">
  
  <div class="col-span-1 border-r border-r-gray-300">
    <div class="group sticky top-1/2 -translate-y-1/2 flex flex-col items-center">
      <a href="/perfil" class="group flex flex-col items-center gap-4">
        <img
          [src]="usuario.foto"
          class="w-24 h-24 rounded-full object-cover group-hover:shadow-md "
        />
        <h1 class="text-2xl font-bold text-gray-800 leading-5 uppercase ">
          {{ usuario.nombre }}
        </h1>
        <h2 class="leading-0 text-xs font-semibold transition-colors text-purple-700 ">
          Ir a mi perfil
        </h2>
      </a>
    </div>
    <a href="/dashboard-usuarios">holaaa</a>
    <div></div>
    <a href="/dashboard-estadisticas">stats</a>
  </div>

  <div class="col-span-3 border-r border-r-gray-300 flex flex-col items-center pt-10 px-4 overflow-y-auto shadow-[15px_0_20px_-15px_rgba(0,0,0,0.1),-15px_0_20px_-15px_rgba(0,0,0,0.1)]">
    
   <div class="w-full max-w-3xl bg-white rounded-3xl border border-gray-200 shadow-md p-6 mb-8 mt-9 ">

    <div class="flex gap-4">

      <img
        [src]="usuario.foto"
        class="w-14 h-14 rounded-full object-cover border-2 border-purple-100 shadow-sm"
      />

      <div class="flex-1">

        <input
          type="text"
          [(ngModel)]="nuevaPublicacion.titulo"
          placeholder="Título de la publicación"
          class="w-full text-xl font-semibold placeholder:text-gray-400 border-b border-gray-200 pb-3 focus:outline-none focus:border-purple-500 transition-all"
        />

        <textarea
          [(ngModel)]="nuevaPublicacion.mensaje"
          placeholder="¿Qué estás pensando?"
          rows="4"
          class="w-full mt-4 p-4 border border-gray-200 rounded-2xl resize-none focus:outline-none focus:ring-2 focus:ring-purple-300 transition-all"
        ></textarea>

      <div class="flex justify-between items-center">
       <label class="cursor-pointer inline-flex items-center gap-2 text-gray-600 hover:text-purple-700 transition">
        <svg class="w-6 h-6 " aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8v8a5 5 0 1 0 10 0V6.5a3.5 3.5 0 1 0-7 0V15a2 2 0 0 0 4 0V8"/>
        </svg>
          <span *ngIf="!cargada()">
            Subir imagen
          </span>

          <span *ngIf="cargada()"
                class="flex items-center gap-1 font-medium">
            ✓ Imagen cargada
            <span class="text-sm">Subir imagen</span><input type="file" (change)="subirImagen($event)" accept="image/*"class="hidden"/>
          </span>

        </label>

          <button
            (click)="enviarPublicacion()"
            class="px-7 mt-1 py-2.5 bg-purple-700 hover:bg-purple-800 text-white font-semibold rounded-full shadow-md hover:shadow-lg transition-all duration-300 hover:scale-105">
            Publicar
          </button>
        </div>
      </div>

    </div>
    </div>

    <div class="w-full max-w-3xl flex justify-end mb-3">
        <div class="relative flex items-center">
          <select
          (change)="cambiarOrden($event)" 
          class="rounded-b-lg border-b border-gray-300 text-sm text-gray-700 focus:outline-none cursor-pointer  hover:border-purple-300 transition-all">
          <option value="fecha">Más recientes</option>
          <option value="likes">Más populares</option>
        </select>
      </div>
    </div>

    <div class="w-full max-w-3xl flex flex-col gap-4 mb-4">

      <app-publicacion
        *ngFor="let p of listaPublicaciones()"
        [publicacion]="p"
        (eliminada)="obtenerPublicaciones()"
        (likeCambiado)="actualizarPublicacion($event)">
      </app-publicacion>

    </div>
    <div class="flex justify-center  mb-4">
        <button 
          (click)="cargarMas()" 
          class="px-5 py-2 bg-white border border-purple-200 text-purple-700 rounded-full font-medium hover:bg-purple-50 transition-all shadow-sm flex items-center gap-2">
          <span>Cargar más publicaciones</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
      </div>
  </div>
</div>
