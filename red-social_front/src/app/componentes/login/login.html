<div class="grid grid-cols-5 min-h-screen">
  
  <div class="col-span-3 border-r border-purple-200 flex justify-center items-center">
    <img src="login_1.png" alt="imagenLogin" class="w-3xl h-3xl object-cover">
  </div>

<div class="col-span-2 flex justify-center items-center p-6">

  <form class="flex flex-col gap-4 w-full max-w-sm">
    
    <div class="text-left mb-2">
        <h2 class="text-2xl font-bold text-black ml-1">LOG</h2>
        <p class="text-9xl text-purple-600 -mt-3"style="font-family: 'Black Ops One';">IN</p>
    </div>

    <input type="email" appAutoFocus placeholder="Email - Nombre de Usuario" name="email"
      [(ngModel)]="identificador"  class="bg-purple-200 border border-purple-500 p-3 rounded text-black focus:outline-none focus:border-purple-900">

    <input type="password" placeholder="Contraseña" name="password"
      [(ngModel)]="clave"  class="bg-purple-200 border border-purple-500 p-3 rounded text-black focus:outline-none focus:border-purple-900">

    <button type="submit" (click)="iniciarSesion()" 
        class="bg-purple-900 text-white font-bold py-3 rounded uppercase tracking-widest hover:bg-purple-950 transition-colors mt-2">
        Entrar
    </button>
     <div class="text-center pt-2">
            <a routerLink="/registro" class="text-slate-600 text-sm font-medium cursor-default">
                ¿No tenés cuenta? <span class="text-sky-500 cursor-pointer font-bold tracking-wider hover:underline">Registrate</span>
            </a>
    </div>
  </form>
</div>
</div>
