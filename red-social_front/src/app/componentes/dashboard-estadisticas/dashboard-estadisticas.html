<div class="min-h-screen bg-linear-to-b from-[#540863] via-[#71306F] to-[#92487A] p-8">
  <div class="max-w-6xl mx-auto">
    
    <h1 class="text-5xl font-black text-center text-[#FFD3D5] mb-10 tracking-wide uppercase drop-shadow-md">
      Dashboard Estadísticas
    </h1>

    <div class="flex items-end gap-6 mb-8 bg-[#92487A] p-6 rounded-3xl border border-[#E49BA6] shadow-xl">
      <div class="flex flex-col gap-1.5 flex-1">
        <label class="text-xs font-bold text-[#FFD3D5] uppercase tracking-wider">Desde</label>
        <input type="date" [(ngModel)]="desde" class="w-full bg-[#71306F] border border-[#E49BA6]/50 text-[#FFD3D5] rounded-xl px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-[#FFD3D5] transition-all">
      </div>
      
      <div class="flex flex-col gap-1.5 flex-1">
        <label class="text-xs font-bold text-[#FFD3D5] uppercase tracking-wider">Hasta</label>
        <input type="date" [(ngModel)]="hasta" class="w-full bg-[#71306F] border border-[#E49BA6]/50 text-[#FFD3D5] rounded-xl px-4 py-2.5 focus:outline-none focus:ring-1 focus:ring-[#FFD3D5] transition-all">
      </div>

      <button
        (click)="buscarEstadisticas()"
        class="bg-[#E49BA6] text-[#540863] px-10 py-2.5 rounded-full font-bold hover:bg-[#FFD3D5] transition-all shadow-md hover:shadow-lg hover:scale-103 active:scale-97 cursor-pointer tracking-wide uppercase text-sm h-11">
        Buscar
      </button>
    </div>

    <div class="grid grid-cols-2 gap-6">

      <div class="bg-[#92487A] p-6 rounded-3xl border border-[#E49BA6]/60 shadow-lg hover:border-[#E49BA6] transition duration-300">
        <h2 class="font-bold text-lg text-[#FFD3D5] mb-6 tracking-wide border-b border-[#E49BA6]/20 pb-2">Comentarios por publicación</h2>
        <div class="relative w-full">
          <canvas id="chartComentPorPublicaciones"></canvas>
        </div>
      </div>

      <div class="bg-[#92487A] p-6 rounded-3xl border border-[#E49BA6]/60 shadow-lg hover:border-[#E49BA6] transition duration-300">
        <h2 class="font-bold text-lg text-[#FFD3D5] mb-6 tracking-wide border-b border-[#E49BA6]/20 pb-2">Comentarios por fecha</h2>
        <div class="relative w-full">
          <canvas id="chartPorFechas"></canvas>
        </div>
      </div>

      <div class="bg-[#92487A] p-6 rounded-3xl border border-[#E49BA6]/60 shadow-lg col-span-2 hover:border-[#E49BA6] transition duration-300">
        <h2 class="font-bold text-lg text-[#FFD3D5] mb-6 tracking-wide border-b border-[#E49BA6]/20 pb-2">Publicación por usuario</h2>
        <div class="relative w-full">
          <canvas id="chartPublicacionesPorUsuarios"></canvas>
        </div>
      </div>

      <div class="bg-[#92487A] p-6 rounded-3xl border border-[#E49BA6]/60 shadow-lg hover:border-[#E49BA6] transition duration-300">
        <h2 class="font-bold text-lg text-[#FFD3D5] mb-6 tracking-wide border-b border-[#E49BA6]/20 pb-2">Ingresos por usuario</h2>
        <div class="relative w-full">
          <canvas id="chartIngresosUsuarios"></canvas>
        </div>
      </div>

      <div class="bg-[#92487A] p-6 rounded-3xl border border-[#E49BA6]/60 shadow-lg hover:border-[#E49BA6] transition duration-300">
        <h2 class="font-bold text-lg text-[#FFD3D5] mb-6 tracking-wide border-b border-[#E49BA6]/20 pb-2">Visitas a perfiles</h2>
        <div class="relative w-full">
          <canvas id="chartVisitasPerfil"></canvas>
        </div>
      </div>

      <div class="bg-[#92487A] p-6 rounded-3xl border border-[#E49BA6]/60 shadow-lg col-span-2 hover:border-[#E49BA6] transition duration-300">
        <h2 class="font-bold text-lg text-[#FFD3D5] mb-6 tracking-wide border-b border-[#E49BA6]/20 pb-2">Likes por día</h2>
        <div class="relative w-full">
          <canvas id="chartLikesDia"></canvas>
        </div>
      </div>

    </div>
  </div>
</div>
