<div class="p-8 max-w-6xl mx-auto">
  
  <h1 class="text-3xl font-bold text-gray-900 mb-8">Dashboard Estadísticas</h1>

  <div class="flex items-center gap-4 mb-8 bg-white p-4 rounded-3xl border border-gray-200 shadow-sm">
    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-gray-400 uppercase">Desde</label>
      <input type="date" [(ngModel)]="desde" class="border border-gray-200 rounded-xl px-4 py-2 focus:outline-purple-400 transition-all">
    </div>
    
    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-gray-400 uppercase">Hasta</label>
      <input type="date" [(ngModel)]="hasta" class="border border-gray-200 rounded-xl px-4 py-2 focus:outline-purple-400 transition-all">
    </div>

    <button
      (click)="buscarEstadisticas()"
      class="mt-4 bg-purple-700 text-white px-8 py-2.5 rounded-full font-semibold hover:bg-purple-800 transition-all shadow-md hover:shadow-lg active:scale-95">
      Buscar
    </button>
  </div>

  <div class="grid grid-cols-2 gap-6">

    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm">
      <h2 class="font-bold text-gray-900 mb-6">Comentarios por publicación</h2>
      <canvas id="chartComentPorPublicaciones"></canvas>
    </div>

    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm">
      <h2 class="font-bold text-gray-900 mb-6">Comentarios por fecha</h2>
      <canvas id="chartPorFechas"></canvas>
    </div>

    <div class="bg-white p-6 rounded-3xl border border-gray-200 shadow-sm col-span-2">
      <h2 class="font-bold text-gray-900 mb-6">Publicación por usuario</h2>
      <canvas id="chartPublicacionesPorUsuarios"></canvas>
    </div>

  </div>

</div>
