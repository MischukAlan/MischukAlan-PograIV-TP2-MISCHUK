<div class="min-h-screen bg-gray-100 p-8">

    <h1 class="text-5xl font-black text-center text-purple-700 mb-10">
        Dashboard Users
    </h1>

    <div class="grid grid-cols-2 gap-8">

     <div class="flex flex-col">
         <form [formGroup]="registroForm" (ngSubmit)="crearUsuario()" class="bg-white p-6 rounded-xl shadow w-full h-[90vh] overflow-y-auto">
            <h2 class="text-3xl font-bold text-purple-700 mb-5">
                Crear Usuario
            </h2>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-purple-900 mb-1">Nombre</label>
                    <input formControlName="nombre" type="text" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
                </div>
                <div>
                    <label class="block text-xs font-bold text-purple-900 mb-1">Apellido</label>
                    <input formControlName="apellido" type="text" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
                </div>
            </div>

            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">Nombre de usuario</label>
                <input formControlName="username" type="text" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
            </div>

            <div class="grid grid-cols-2 gap-4">
            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">Fecha de Nacimiento</label>
                <input formControlName="fechaNacimiento" type="date" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
            </div>

            <div class="mt-3">
            <label class="block text-xs font-bold text-purple-900 mb-1">Imagen de Perfil</label>
            <input type="file" id="fileInput" (change)="seleccionarArchivo($event)" class="hidden" accept="image/*">
            <label for="fileInput" class="block w-full text-center bg-purple-200 border border-purple-400 p-2 rounded text-sm text-purple-800 cursor-pointer hover:bg-purple-300 transition">
                {{ fotoPerfil() ? fotoPerfil.name : 'Seleccionar foto de perfil...' }}
            </label>
            </div>
            </div>

            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">Descripcion</label>
                <input formControlName="descripcion" type="text" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
            </div>
            
            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">
                    Perfil
                </label>

                <select
                    formControlName="perfil"
                    class="w-full bg-purple-100 border border-purple-300 rounded p-2 text-purple-900 font-medium cursor-pointer transition">
                    <option value="usuario">Usuario</option>
                    <option value="administrador">Administrador</option>

                </select>
            </div>
            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">Email</label>
                <input formControlName="email" type="email" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
            </div>


            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">Repetir Email</label>
                <input formControlName="emailConfirm" type="email" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
            </div>

            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">Contraseña</label>
                <input formControlName="password" type="password" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
            </div>

            <div class="mt-2">
                <label class="block text-xs font-bold text-purple-900 mb-1">Repetir Contraseña</label>
                <input formControlName="passwordConfirm" type="password" class="w-full bg-purple-100 border border-purple-300 p-2 rounded">
            </div>



            <button
                type="submit"
                class="w-full bg-purple-700 text-white p-2 rounded mt-4 hover:bg-purple-800">
                Crear nuevo usuario
            </button>

              <div class="w-full max-w-3xl flex justify-end mb-3">
                

            </div>

        </form>

    </div>
<div class="flex flex-col">

    <div class="bg-white p-6 rounded-xl shadow h-[90vh] overflow-y-auto">
            
        <h2 class="text-3xl font-bold text-purple-700 mb-5">
            Administrar Usuarios
        </h2>
        <div *ngFor="let u of usuarios()" class="bg-white p-4 rounded-xl shadow border mb-3">
                
    <div class="flex justify-between items-start">

        <div class="flex gap-3">

            <img [src]="u.fotoPerfil"
                 class="w-12 h-12 rounded-full object-cover">

            <div>
                <p class="font-semibold text-lg">
                    {{ u.nombre }} {{ u.apellido }}
                </p>

                <p class="text-sm text-gray-500">{{ u.email }}</p>

                <p class="text-xs text-gray-400">
                    {{ u.perfil }}
                </p>
            </div>

        </div>

        <button
            (click)="desactivarUsuario(u._id)"
            class="text-gray-500 hover:text-red-600 transition cursor-pointer">

            <svg class="w-6 h-6"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24">
                <path stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M16 12h4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>

        </button>

    </div>

</div>

<div *ngFor="let u of usuariosDesactivados()" class="bg-white p-4 rounded-xl shadow border mb-3">

    <div class="flex justify-between items-start">

        <div class="flex gap-3">

            <img [src]="u.fotoPerfil"
                 class="w-12 h-12 rounded-full object-cover grayscale">

            <div>

                <div class="flex items-center gap-2">

                    <p class="font-semibold text-lg text-gray-500">
                        {{ u.nombre }} {{ u.apellido }}
                    </p>

                    <span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full">
                        Usuario desactivado
                    </span>

                </div>

                <p class="text-sm text-gray-500">{{ u.email }}</p>

                <p class="text-xs text-gray-400">
                    {{ u.perfil }}
                </p>

            </div>

        </div>

        <button
            (click)="activarUsuario(u._id)"
            class="text-purple-600 hover:text-purple-800 hover:scale-105 transition cursor-pointer">

            <svg class="w-6 h-6"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24">
                <path stroke="currentColor"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M16 12h4m-2 2v-4M4 18v-1a3 3 0 0 1 3-3h4a3 3 0 0 1 3 3v1a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1Zm8-10a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
            </svg>

        </button>

    </div>

</div>
