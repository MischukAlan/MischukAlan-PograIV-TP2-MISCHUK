<div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
  <div class="flex items-start gap-3 mb-3"> 
    <img [src]="publicacion.fotoAutor" class="w-10 h-10 rounded-full object-cover" />
    
    <div class="flex grow justify-between items-start">
      <div class="flex flex-col leading-none">
        <h4 class="font-semibold text-gray-800">{{ publicacion.autor }}</h4>
        <span class="text-xs text-gray-400">{{ publicacion.fechaCreado | date:'short' }}</span>
      </div>

      <button *ngIf="esDueno()" (click)="eliminar()" class="text-gray-400 hover:text-red-500 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
        </svg>
      </button>
    </div>
  </div>

  <h3 class="font-bold text-md text-gray-800">{{ publicacion.titulo }}</h3>
  <p class="text-gray-600 text-sm mt-1">{{ publicacion.mensaje }}</p>
  
<div class="flex items-center gap-4 mt-4">

    <button
    (click)="darLike()"
    class="flex items-center gap-1 transition-all duration-100 hover:scale-110"
    [class.text-red-500]="publicacion.likes.includes(miUsuarioId)"
    [class.text-gray-400]="!publicacion.likes.includes(miUsuarioId)"
    >
    <svg 
        class="w-6 h-6" 
        aria-hidden="true" 
        xmlns="http://www.w3.org/2000/svg" 
        width="24" 
        height="24" 
        viewBox="0 0 24 24"
        [attr.fill]="publicacion.likes.includes(miUsuarioId) ? 'currentColor' : 'none'"
    >
        <path 
        stroke="currentColor" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        stroke-width="2" 
        d="M12.01 6.001C6.5 1 1 8 5.782 13.001L12.011 20l6.23-7C23 8 17.5 1 12.01 6.002Z"
        />
    </svg>

    <span class="text-sm font-medium">
        {{ publicacion.likes.length }}
    </span>
    </button>

</div>
