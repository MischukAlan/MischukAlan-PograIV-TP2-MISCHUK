<div class="bg-[#92487A] rounded-3xl border border-[#E49BA6] shadow-sm hover:shadow-md transition-all duration-200 p-6">

  <div class="flex justify-between items-start">

    <div [routerLink]="['/perfil', publicacion.usuarioId]"
     class="flex items-center gap-3 cursor-pointer">
      
      <img *ngIf="publicacion.fotoAutor"
        [src]="publicacion.fotoAutor"
        class="w-12 h-12 rounded-full object-cover border border-[#E49BA6]" />
      <div *ngIf="!publicacion.fotoAutor" 
          class="w-12 h-12 rounded-full bg-purple-400 flex items-center justify-center text-white text-xl font-bold">
        {{ publicacion.autor | iniciales }}
      </div>

      <div>
        <h4 class="font-semibold text-[#FFD3D5] whitespace-pre-wrap wrap-break-word">
          {{ publicacion.autor }}
        </h4>

        <span class="text-xs text-[#E49BA6]">
          {{ publicacion.fechaCreado | tiempoTranscurrido }}
        </span>
      </div>
    </div>

    <div class="flex">  
      <button *ngIf="esDueno()" 
        (click)="editar()" 
          appTooltip="Editar"
          class="p-2 rounded-full text-[#E49BA6] hover:bg-[#71306F] hover:text-[#FFD3D5] transition cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
            </svg>
    </button>

    <button
      *ngIf="esDuenoOAdmin()"
      (click)="eliminar()"
      appTooltip="Borrar"
      class="p-2 rounded-full text-[#E49BA6] hover:bg-red-950 hover:text-red-400 transition cursor-pointer">

      <svg xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5">

        <path stroke-linecap="round"
          stroke-linejoin="round"
          d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
      </svg>
      
    </button>

  </div>
  </div>
 
  <div class="mt-5">

  <div *ngIf="!publicacion.editando; else editarPublicacion">

  <h2 class="text-xl font-bold text-[#FFD3D5] whitespace-pre-wrap wrap-break-word">
    {{ publicacion.titulo }}
  </h2>

  <p class="mt-2 text-[#FFD3D5]/90 leading-relaxed whitespace-pre-wrap wrap-break-word">
    {{ publicacion.mensaje }}
  </p>

</div>

<ng-template #editarPublicacion>

  <input
      [(ngModel)]="publicacion.tituloEditado"
      class="w-full bg-[#71306F] border border-[#E49BA6] rounded-lg p-2 font-bold text-[#FFD3D5] mb-3 focus:outline-none focus:ring-1 focus:ring-[#FFD3D5]">

  <textarea
      [(ngModel)]="publicacion.mensajeEditado"
      rows="5"
      class="w-full bg-[#71306F] border border-[#E49BA6] rounded-lg p-2 text-[#FFD3D5] focus:outline-none focus:ring-1 focus:ring-[#FFD3D5]">
  </textarea>

  <div class="mt-3">
    <label
      for="editarImagen"
      class="cursor-pointer bg-[#E49BA6] text-[#540863] font-semibold px-4 py-2 rounded-lg border border-transparent hover:bg-[#FFD3D5] transition-all inline-block">
      Cambiar imagen
    </label>

    <input
      id="editarImagen"
      type="file"
      class="hidden"
      accept="image/*"
      (change)="subirImagen($event)">

  </div>

  <div class="flex gap-2 mt-4">

      <button
          (click)="guardar()"
          class="bg-[#E49BA6] text-[#540863] font-bold px-5 py-2 rounded-lg hover:bg-[#FFD3D5] transition-all cursor-pointer">
          Guardar
      </button>

      <button
          (click)="cancelar()"
          class="border border-[#E49BA6] text-[#E49BA6] px-5 py-2 rounded-lg hover:bg-[#71306F] hover:text-[#FFD3D5] transition-all cursor-pointer">
          Cancelar
      </button>

  </div>

</ng-template>

    <div class="mt-4" *ngIf="publicacion?.imagenUrl">
      <img [src]="publicacion.imagenUrl" class="rounded-2xl w-full object-cover max-h-96 border border-[#E49BA6]" />
    </div>

  </div>


  <div class="mt-6 flex items-center gap-5 border-t border-[#E49BA6] pt-4">

    <button
      (click)="darLike()"
      class="flex items-center gap-2 px-4 py-2 rounded-full transition cursor-pointer"
      [class.text-red-400]="publicacion.likes.includes(miUsuarioId)"
      [class.bg-red-500/10]="publicacion.likes.includes(miUsuarioId)"
      [class.text-[#E49BA6]]="!publicacion.likes.includes(miUsuarioId)"
      [class.hover:bg-[#71306F]]="true">

      <svg
        class="w-6 h-6"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        [attr.fill]="publicacion.likes.includes(miUsuarioId) ? 'currentColor' : 'none'">

        <path
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12.01 6.001C6.5 1 1 8 5.782 13.001L12.011 20l6.23-7C23 8 17.5 1 12.01 6.002Z"/>
      </svg>

      <span class="font-medium">
        {{ publicacion.likes.length }}
      </span>

    </button>

    <a
      [routerLink]="['/publicacion-detalle', publicacion._id]"
      class="flex items-center gap-2 px-4 py-2 rounded-full text-[#E49BA6] hover:bg-[#71306F] hover:text-[#FFD3D5] transition cursor-pointer">

      <svg xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-6 h-6">

        <path stroke-linecap="round"
          stroke-linejoin="round"
          d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
      </svg>

      <span class="font-medium">
        Ver comentarios
      </span>

    </a>

  </div>

</div>
